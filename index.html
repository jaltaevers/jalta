<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<meta name="theme-color" content="#FFFFFF">
<title>JALTA — Objet d'Art</title>
<meta name="description" content="JALTA — collectible ceramic objects. Tel Aviv.">
<link rel="preload" as="image" href="img/hero-1.jpg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

:root{
  color-scheme: only light;
  --paper:#FFFFFF;
  --paper-deep:#F4F3F0;
  --ink:#161616;
  --ink-soft:#6f6a62;
  --card:#FFFFFF;
  --font-sans:'Switzer','Helvetica Neue',Helvetica,Arial,sans-serif;
  --font-display:'STIX Two Text','Times New Roman',Times,serif;
  --font-mono:'Courier Prime','Courier New',monospace;
  --logo-w:13.65vw;
  --subtitle-size:8px;
  --nav-size:14px;
  --title-size:40px;
  --gap: clamp(20px, 3vw, 44px);
  --card-h: min(66vh, 640px);
  --pad: clamp(18px, 3vw, 40px);
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
html{forced-color-adjust:none}
body{
  font-family:var(--font-sans);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  height:100%;
  overflow:hidden;
}
img,svg{display:block}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
::selection{background:var(--ink);color:var(--paper)}

/* ───────────── top bar ───────────── */
.bar{
  position:fixed;inset:0 0 auto 0;z-index:40;
  display:flex;justify-content:space-between;align-items:center;
  padding:calc(var(--pad)*.7) var(--pad);
  pointer-events:none;
  mix-blend-mode:multiply;
}
.bar > *{pointer-events:auto}
.wordmark{
  display:block;width:clamp(96px, 9vw, 126px);
  opacity:1;transition:opacity .5s ease;
}
.wordmark .wordlogo{width:100%;height:auto}
body[data-view="home"] .wordmark{opacity:0;pointer-events:none}
.nav{display:flex;gap:clamp(18px,2.6vw,36px)}
.nav button{
  font-size:var(--nav-size);letter-spacing:0;text-transform:lowercase;font-weight:400;
  padding:4px 0;position:relative;
}
.nav button::after{
  content:"";position:absolute;left:0;bottom:0;height:1px;width:100%;
  background:var(--ink);transform:scaleX(0);transform-origin:left;
  transition:transform .35s cubic-bezier(.22,.61,.36,1);
}
.nav button:hover::after,.nav button[aria-current="true"]::after{transform:scaleX(1)}
.nav button:focus-visible{outline:1px solid var(--ink);outline-offset:4px}

/* ───────────── views ───────────── */
.view{position:fixed;inset:0;opacity:0;visibility:hidden;transition:opacity .55s ease,visibility 0s linear .55s}
.view.active{opacity:1;visibility:visible;transition:opacity .55s ease}

/* ── landing ── */
#view-home{display:flex;align-items:center;justify-content:center;cursor:pointer}
.hero-media{position:absolute;inset:0;overflow:hidden;background:#fff}
.hero-media .slide{
  position:absolute;inset:0;
  transform:translateX(100%);
  transition:transform 1.15s cubic-bezier(.77,0,.18,1);
  will-change:transform;
}
.hero-media .slide.current{transform:translateX(0)}
.hero-media .slide.leaving{transform:translateX(-100%)}
.hero-media .slide img{width:100%;height:100%;object-fit:cover}
@media (prefers-reduced-motion:reduce){.hero-media .slide{transition:none}}
.hero-name{position:relative;z-index:2;text-align:center}
.hero-name .logo{width:var(--logo-w);max-width:86vw;height:auto;margin:0 auto}
.hero-name .sublogo{
  /* scales WITH the logo but ~5x slower (mostly fixed + small viewport part),
     and the 56vw ceiling keeps it always narrower than JALTA (which never
     drops below 60vw on small screens) */
  width:min(calc(var(--logo-w) * .06 + 141px), 56vw);
  height:auto;
  margin:clamp(16px, calc(var(--logo-w) * .075), 46px) auto 0;  /* original lockup gap */
}
.hero-name p{
  margin-top:clamp(10px,1.6vw,22px);
  font-size:var(--subtitle-size);
  letter-spacing:.55em;margin-right:-.55em;
  text-transform:uppercase;color:#fff;
  font-weight:400;
}

/* ── work: horizontal rail ── */
#view-work{display:flex;flex-direction:column;justify-content:center}
.rail{
  display:flex;gap:var(--gap);
  overflow-x:auto;overflow-y:hidden;
  padding:0 max(var(--pad), calc(50vw - (var(--card-h)*0.75)/2));
  scroll-snap-type:x mandatory;
  scrollbar-width:none;
  align-items:center;
  height:100%;
  cursor:grab;
}
.rail.dragging{cursor:grabbing;scroll-snap-type:none}
.rail::-webkit-scrollbar{display:none}
.piece{flex:0 0 auto;scroll-snap-align:center;width:calc(var(--card-h) * 0.5625)}
.piece a{display:block}
.piece .frame{width:100%;aspect-ratio:3/4;overflow:hidden;background:var(--paper-deep)}
.piece .frame svg,.piece .frame img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .8s cubic-bezier(.22,.61,.36,1);
}
.piece a:hover .frame svg,.piece a:hover .frame img{transform:scale(1.035)}
.piece a:focus-visible{outline:1px solid var(--ink);outline-offset:6px}
.caption{display:flex;justify-content:space-between;align-items:baseline;margin-top:14px;font-size:13px;letter-spacing:.05em}
.caption .num{font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase}
.caption .ttl{color:var(--ink-soft);font-weight:300}
.rail-count{position:fixed;bottom:calc(var(--pad)*.8);left:var(--pad);font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;z-index:5}
.rail-hint{position:fixed;bottom:calc(var(--pad)*.8);right:var(--pad);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);z-index:5}

/* ── object detail ── */
#view-object{overflow-y:auto;overscroll-behavior:contain}
.detail{
  display:grid;grid-template-columns:minmax(0,7fr) minmax(320px,5fr);
  gap:var(--gap);
  padding:calc(var(--pad)*2.6) var(--pad) calc(var(--pad)*2);
  max-width:1500px;margin:0 auto;
}
.detail-media{display:flex;flex-direction:column;gap:var(--gap)}
.detail-media .shot{width:100%;aspect-ratio:3/4;overflow:hidden;background:var(--paper-deep)}
.detail-media .shot svg,.detail-media .shot img{width:100%;height:100%;object-fit:cover}
.detail-info{position:relative}
.detail-info .stick{position:sticky;top:calc(var(--pad)*2.6)}
.detail-info .num{font-family:var(--font-mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase}
.detail-info h2{
  font-size:var(--title-size);font-weight:400;letter-spacing:.01em;
  margin:14px 0 26px;line-height:1.1;
}
.detail-info .price{font-size:17px;font-weight:400;margin:-14px 0 26px;letter-spacing:.02em}
.spec{border-top:1px solid var(--ink)}
.spec-row{
  display:grid;grid-template-columns:130px 1fr;gap:18px;
  padding:11px 0;border-bottom:1px solid rgba(22,22,22,.18);
  font-size:13.5px;line-height:1.5;
}
.spec-row dt{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);padding-top:2px}
.detail-info .blurb{margin-top:26px;font-size:14px;line-height:1.65;color:var(--ink-soft);max-width:42ch;font-weight:300}
.detail-actions{display:flex;align-items:center;gap:26px;margin-top:30px;flex-wrap:wrap}
.detail-info .buy{
  display:inline-block;background:var(--ink);color:var(--paper);
  font-size:13px;letter-spacing:.18em;text-transform:uppercase;
  padding:13px 30px;
}
.detail-info .buy:hover{opacity:.82}
.detail-info .inquire{
  display:inline-block;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;border-bottom:1px solid var(--ink);padding-bottom:3px;
}
.detail-nav{
  display:flex;justify-content:space-between;margin-top:44px;
  font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;
}
.detail-nav button{padding:6px 0}
.detail-nav button:hover{text-decoration:underline;text-underline-offset:4px}
.back{
  position:fixed;top:auto;z-index:30;
  font-size:12px;letter-spacing:.22em;text-transform:uppercase;
  bottom:calc(var(--pad)*.8);left:var(--pad);
  border-bottom:1px solid var(--ink);padding-bottom:2px;
  display:none;
}
body[data-view="object"] .back{display:block}

/* ── simple text pages ── */
#view-page{overflow-y:auto}
.page-wrap{max-width:640px;margin:0 auto;padding:calc(var(--pad)*3.2) var(--pad) calc(var(--pad)*2)}
.page-wrap h2{font-family:var(--font-display);font-size:clamp(26px,3vw,38px);font-weight:400;margin-bottom:26px}
.page-wrap .body{font-size:15px;line-height:1.75;font-weight:300;white-space:pre-wrap}

/* ── about popup ── */
.about-overlay{
  position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:flex-end;
  padding:var(--pad);
  background:rgba(22,22,22,.18);backdrop-filter:blur(2px);
  opacity:0;visibility:hidden;transition:opacity .4s ease,visibility 0s linear .4s;
}
.about-overlay.open{opacity:1;visibility:visible;transition:opacity .4s ease}
.about-card{
  position:relative;
  width:min(440px,100%);max-height:calc(100vh - var(--pad)*2);overflow-y:auto;
  background:var(--card);
  font-family:var(--font-mono);font-size:13px;line-height:1.7;
  padding:60px 28px 34px;
  box-shadow:0 24px 70px rgba(20,18,12,.22);
  transform:translateX(16px);transition:transform .45s cubic-bezier(.22,.61,.36,1);
}
.about-overlay.open .about-card{transform:translateX(0)}
.about-card .x{
  position:absolute;top:9px;right:18px;z-index:2;
  font-family:var(--font-sans);font-size:34px;line-height:1;font-weight:300;
  color:var(--ink);padding:4px 8px;
}
.about-card .x:hover{opacity:.55}
.about-img{width:100%;aspect-ratio:3/4;overflow:hidden;margin-bottom:18px;background:var(--paper-deep)}
.about-img svg,.about-img img{width:100%;height:100%;object-fit:cover}
.about-head{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:12px;border-bottom:1px solid var(--ink)}
.about-head em{font-style:italic;font-size:17px}
.about-row{display:flex;justify-content:space-between;gap:20px;padding:10px 0;border-bottom:1px solid rgba(22,22,22,.25)}
.about-row .k{text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:var(--ink-soft);white-space:nowrap;padding-top:3px}
.about-row .v{text-align:right}
.about-row .v a{border-bottom:1px solid var(--ink)}
.about-bio{padding:18px 0 6px;border-bottom:1px solid rgba(22,22,22,.25)}
.about-foot{margin-top:26px;font-size:11px;letter-spacing:.06em;color:var(--ink-soft)}

/* ── responsive ── */
@media (max-width:840px){
  :root{--card-h:min(56vh,480px)}
  .detail{grid-template-columns:1fr;padding-top:92px}
  .detail-info{order:-1}
  .detail-info .stick{position:static}
  .detail-info h2{margin-bottom:18px}
  .about-overlay{align-items:flex-end;justify-content:center}
  .rail-hint{display:none}
  .hero-name .logo{width:max(60vw, var(--logo-w))}
}
</style>
</head>

<header class="bar">

const CFG = JSON.parse(document.getElementById("site-config").textContent);
const OBJECTS = CFG.objects;

/* ─── fonts: load + apply ─── */
const FONT_SOURCES = {

  "EB Garamond":      "https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap",
};
(function applyFonts(){
  const f=CFG.fonts||{};
  [f.display, f.body].forEach(name=>{
    const url=FONT_SOURCES[name];
    if(!url)return;
    const l=document.createElement("link");l.rel="stylesheet";l.href=url;
    document.head.appendChild(l);
  });
  const root=document.documentElement.style;
  if(f.display) root.setProperty("--font-display", `'${f.display}','Times New Roman',serif`);
  if(f.body)    root.setProperty("--font-sans", `'${f.body}','Helvetica Neue',Helvetica,Arial,sans-serif`);
  if(f.logoWidth)    root.setProperty("--logo-w", f.logoWidth+"vw");
  if(f.navSize)      root.setProperty("--nav-size", f.navSize+"px");
  if(f.titleSize)    root.setProperty("--title-size", f.titleSize+"px");
  if(f.subtitleSize) root.setProperty("--subtitle-size", f.subtitleSize+"px");
})();

document.title = CFG.siteTitle || document.title;
document.getElementById("subtitle").textContent = CFG.subtitle || "";

/* ─── nav (work / custom pages / about) ─── */
(function buildNav(){
  const nav=document.getElementById("nav");
  let html=`<button id="nav-work" onclick="go('#/work')">Work</button>`;
  (CFG.pages||[]).forEach((p,i)=>{html+=`<button onclick="go('#/page/${i}')">${p.title}</button>`});
  html+=`<button id="nav-about" onclick="openAbout()">About</button>`;
  nav.innerHTML=html;
})();

function speckle(r,n,x,y,w,h,fill){
  let out="";for(let i=0;i<n;i++){out+=`<circle cx="${x+r()*w}" cy="${y+r()*h}" r="${.8+r()*1.6}" fill="${fill}" opacity="${.25+r()*.4}"/>`}
  return out;
}
function shade(hex,f){
  const n=parseInt(hex.slice(1),16),d=v=>Math.max(0,Math.round(v*f));
  return `#${((d(n>>16)<<16)|(d((n>>8)&255)<<8)|d(n&255)).toString(16).padStart(6,"0")}`;
}

    <circle cx="300" cy="338" r="46" fill="${c}" stroke="${d}" stroke-width="2"/>
    ${[ -64,0,64 ].map(x=>`<circle cx="${300+x}" cy="286" r="16" fill="${c}" stroke="${d}" stroke-width="2"/>`).join("")}
    <rect x="288" y="350" width="24" height="7" rx="3.5" fill="#161616" opacity=".88"/>`,
  saucer:(c,d)=>`
    <ellipse cx="300" cy="630" rx="200" ry="26" fill="#000" opacity=".07"/>
    <ellipse cx="300" cy="566" rx="208" ry="62" fill="${c}"/>
    ${Array.from({length:9},(_,i)=>{const x=120+i*45;return `<circle cx="${x}" cy="${566+Math.sin(i*1.7)*8}" r="13" fill="${c}" stroke="${d}" stroke-width="2"/>`}).join("")}
    <path d="M190 560 Q190 400 300 380 Q410 400 410 560 Q360 596 300 596 Q240 596 190 560 Z" fill="${c}" stroke="${d}" stroke-width="2"/>
    <circle cx="300" cy="358" r="26" fill="${c}" stroke="${d}" stroke-width="2"/>
    <rect x="287" y="452" width="26" height="8" rx="4" fill="#161616" opacity=".88"/>`,
  ears:(c,d)=>`
    <ellipse cx="300" cy="640" rx="160" ry="24" fill="#000" opacity=".07"/>
    <circle cx="198" cy="306" r="56" fill="none" stroke="${c}" stroke-width="30"/>
    <circle cx="402" cy="306" r="56" fill="none" stroke="${c}" stroke-width="30"/>
    <path d="M160 560 Q150 370 300 350 Q450 370 440 560 Q440 626 300 632 Q160 626 160 560 Z" fill="${c}"/>
    <rect x="276" y="430" width="48" height="10" rx="5" fill="#161616" opacity=".88"/>
    ${[ -70,0,70 ].map(x=>`<circle cx="${300+x}" cy="592" r="26" fill="${c}" stroke="${d}" stroke-width="2"/>`).join("")}`,
  amphora:(c,d)=>`
    <ellipse cx="300" cy="636" rx="150" ry="24" fill="#000" opacity=".07"/>
    <circle cx="196" cy="330" r="46" fill="none" stroke="${c}" stroke-width="26"/>
    <circle cx="404" cy="330" r="46" fill="none" stroke="${c}" stroke-width="26"/>
    <path d="M178 560 Q160 360 300 340 Q440 360 422 560 Q422 622 300 628 Q178 622 178 560 Z" fill="${c}"/>
    <ellipse cx="300" cy="352" rx="66" ry="20" fill="${d}"/>
    <ellipse cx="300" cy="348" rx="56" ry="15" fill="#161616" opacity=".82"/>`,
  stack:(c,d)=>`
    <ellipse cx="300" cy="640" rx="140" ry="22" fill="#000" opacity=".07"/>
    ${[560,440,320].map((y,i)=>`
      <path d="M${210+i*8} ${y} Q${210+i*8} ${y-96} 300 ${y-96} Q${390-i*8} ${y-96} ${390-i*8} ${y}
               Q${390-i*8} ${y+34} 300 ${y+38} Q${210+i*8} ${y+34} ${210+i*8} ${y} Z"
            fill="${c}" stroke="${d}" stroke-width="2"/>
      <ellipse cx="300" cy="${y-92}" rx="${88-i*7}" ry="16" fill="${d}" opacity=".55"/>`).join("")}`,
};
function objectSVG(o, variant=0, seed=1){
  const shape=SHAPES[o.shape]?o.shape:"bell";
  const c=o.color||"#C99A5B";
  const r=rng(seed*97+variant*13+3), d=shade(c,.62);
  const bg = variant===2 ? "#EFEEEB" : "#F7F6F3";
  const zoom = variant===1 ? 'viewBox="120 230 360 480"' : 'viewBox="0 0 600 800"';
  const grey = variant===2 ? 'style="filter:grayscale(1)"' : '';
  return `<svg xmlns="http://www.w3.org/2000/svg" ${zoom} preserveAspectRatio="xMidYMid slice" ${grey} role="img" aria-label="Placeholder — Object ${o.num}">
    <rect x="-200" y="-200" width="1000" height="1200" fill="${bg}"/>
    ${speckle(r,26,40,60,520,680,"#161616")}
    ${SHAPES[shape](c,d)}
    ${speckle(r,40,130,300,340,330,"#161616")}
  </svg>`;
}
function mediaFor(o, variant){
  if(o.images && o.images.length){
    const src=o.images[Math.min(variant,o.images.length-1)];
    return `<img src="${src}" alt="Object ${o.num} — ${o.title}" loading="lazy">`;
  }
  return objectSVG(o, variant, parseInt(o.num,10)||1);
}

/* ─── hero slideshow ─── */
(function(){
  const m=document.getElementById("hero-media");
  const pics=(CFG.slideshow&&CFG.slideshow.slides)||[];
  if(!pics.length)return;
  m.innerHTML=pics.map((p,i)=>
    `<div class="slide${i===0?" current":""}"><img src="${p.img}" style="object-position:50% ${p.pos==null?50:p.pos}%" alt="" decoding="async" ${i>1?'loading="lazy"':''}></div>`).join("");
  if(pics.length<2)return;
  const slides=[...m.querySelectorAll(".slide")];
  let i=0;
  setInterval(()=>{
    if(document.body.dataset.view!=="home")return;
    const cur=slides[i];
    i=(i+1)%slides.length;
    const nxt=slides[i];
    nxt.classList.remove("leaving");
    nxt.style.transition="none";nxt.style.transform="translateX(100%)";
    void nxt.offsetWidth;
    nxt.style.transition="";nxt.style.transform="";
    nxt.classList.add("current");
    cur.classList.remove("current");cur.classList.add("leaving");
  }, (CFG.slideshow&&CFG.slideshow.interval)||3000);
})();

/* ─── landing: click anywhere to enter ─── */
document.getElementById("view-home").addEventListener("click",()=>go("#/work"));

/* ─── work rail ─── */
const rail=document.getElementById("rail");
rail.innerHTML=OBJECTS.map((o,i)=>`
  <article class="piece">
    <a href="#/object/${o.num}" data-obj="${o.num}" aria-label="Object ${o.num} — ${o.title}">
      <div class="frame">${mediaFor(o,0)}</div>
      <div class="caption"><span class="num">Object ${o.num}</span><span class="ttl">${o.title}</span></div>
    </a>
  </article>`).join("");

const count=document.getElementById("rail-count");
function updateCount(){
  const pieces=[...rail.querySelectorAll(".piece")];
  if(!pieces.length)return;
  const mid=rail.scrollLeft+rail.clientWidth/2;
  let idx=0,best=1e9;
  pieces.forEach((p,i)=>{const c=p.offsetLeft+p.offsetWidth/2;const d=Math.abs(c-mid);if(d<best){best=d;idx=i}});
  count.textContent=`${String(idx+1).padStart(2,"0")} / ${String(OBJECTS.length).padStart(2,"0")}`;
}
rail.addEventListener("scroll",()=>requestAnimationFrame(updateCount),{passive:true});
updateCount();

rail.addEventListener("wheel",e=>{
  if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){rail.scrollLeft+=e.deltaY;e.preventDefault()}
},{passive:false});

let drag=null,didDrag=false;
rail.addEventListener("pointerdown",e=>{
  if(e.pointerType!=="mouse")return;
  drag={x:e.clientX,sl:rail.scrollLeft};didDrag=false;
});
window.addEventListener("pointermove",e=>{
  if(!drag)return;
  const dx=e.clientX-drag.x;
  if(!didDrag && Math.abs(dx)<8)return;
  didDrag=true;
  rail.classList.add("dragging");
  rail.scrollLeft=drag.sl-dx;
});
window.addEventListener("pointerup",()=>{rail.classList.remove("dragging");drag=null});
rail.addEventListener("dragstart",e=>e.preventDefault());
rail.addEventListener("click",e=>{
  const a=e.target.closest("a[data-obj]");
  if(!a)return;
  e.preventDefault();
  if(didDrag){didDrag=false;return}
  go(a.getAttribute("href"));
},true);

/* ─── detail ─── */
function renderDetail(num){
  const i=OBJECTS.findIndex(o=>o.num===num);
  if(i<0){go("#/work");return}
  const o=OBJECTS[i];
  const prev=OBJECTS[(i-1+OBJECTS.length)%OBJECTS.length];
  const next=OBJECTS[(i+1)%OBJECTS.length];
  const shots=(o.images&&o.images.length?o.images.map((_,v)=>v):[0,1,2])
    .map(v=>`<div class="shot">${mediaFor(o,v)}</div>`).join("");
  document.getElementById("detail").innerHTML=`
    <div class="detail-media">${shots}</div>
    <aside class="detail-info">
      <div class="stick">
        <div class="num">Object ${o.num}</div>
        <h2>${o.title}</h2>
        ${o.price?`<div class="price">${o.price} USD</div>`:""}
        <dl class="spec">
          <div class="spec-row"><dt>Dimensions</dt><dd>${o.dims||""}</dd></div>
          <div class="spec-row"><dt>Material</dt><dd>${o.material||""}</dd></div>
          <div class="spec-row"><dt>Glaze</dt><dd>${o.glaze||""}</dd></div>
          <div class="spec-row"><dt>Year</dt><dd>${o.year||""}</dd></div>
          <div class="spec-row"><dt>Edition</dt><dd>${o.edition||""}</dd></div>
        </dl>
        <p class="blurb">${o.blurb||""}</p>
        <div class="detail-actions">
          ${o.buy?`<a class="buy" href="${o.buy}" target="_blank" rel="noopener">Buy</a>`:""}
          <a class="inquire" href="mailto:${CFG.email}?subject=Inquiry — Object ${o.num}">Inquire about this object</a>
        </div>
        <div class="detail-nav">
          <button onclick="go('#/object/${prev.num}')">&larr; Object ${prev.num}</button>
          <button onclick="go('#/object/${next.num}')">Object ${next.num} &rarr;</button>
        </div>
      </div>
    </aside>`;
  document.getElementById("view-object").scrollTop=0;
}

/* ─── simple pages ─── */
function renderPage(i){
  const p=(CFG.pages||[])[i];
  if(!p){go("#/work");return}
  document.getElementById("page-wrap").innerHTML=
    `<h2>${p.title}</h2><div class="body">${p.body||""}</div>`;
  document.getElementById("view-page").scrollTop=0;
}

/* ─── about ─── */
(function buildAbout(){
  const img=document.getElementById("about-img");
  if(CFG.about.image){img.innerHTML=`<img src="${CFG.about.image}" alt="Jalta in the studio">`}
  else{img.innerHTML=objectSVG(OBJECTS[3]||OBJECTS[0]||{num:"000"},2,9)}
  document.getElementById("about-bio").textContent=CFG.about.bio||"";
  document.getElementById("about-rows").innerHTML=(CFG.about.rows||[]).map(r=>
    `<div class="about-row"><span class="k">${r.k}</span><span class="v">${
      r.link?`<a href="${r.link}" ${r.link.startsWith("http")?'target="_blank" rel="noopener"':''}>${r.v}</a>`:r.v
    }</span></div>`).join("");
  document.getElementById("about-footer").textContent=CFG.about.footer||"";
})();
const about=document.getElementById("about");
function openAbout(){about.classList.add("open");const b=document.getElementById("nav-about");if(b)b.setAttribute("aria-current","true")}
function closeAbout(){about.classList.remove("open");const b=document.getElementById("nav-about");if(b)b.removeAttribute("aria-current")}
window.addEventListener("keydown",e=>{if(e.key==="Escape")closeAbout()});

/* ─── router ─── */
const views={home:"view-home",work:"view-work",object:"view-object",page:"view-page"};
function go(h){
  if(location.hash===h){route()}
  else{try{location.hash=h}catch(_){}; route()}
}
window.go=go;
function route(){
  const h=location.hash||"#/";
  let v="home";
  if(h.startsWith("#/object/")){v="object";renderDetail(h.split("/")[2])}
  else if(h.startsWith("#/page/")){v="page";renderPage(parseInt(h.split("/")[2],10))}
  else if(h==="#/work"){v="work"}
  document.body.dataset.view=v;
  Object.entries(views).forEach(([k,id])=>document.getElementById(id).classList.toggle("active",k===v));
  const nw=document.getElementById("nav-work");
  if(nw)nw.toggleAttribute("aria-current",v==="work"||v==="object");
  closeAbout();
}
window.addEventListener("hashchange",route);
route();
document.getElementById("year").textContent=new Date().getFullYear();
</script>
</body>
</html>
